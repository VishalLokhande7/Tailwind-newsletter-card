<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Card</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-white flex justify-center mt-40">

    <!-- Card -->
    <div class="w-[1050px] rounded-lg border-2 border-black overflow-hidden">

        <!-- Header -->
        <div class="w-full h-24 bg-gradient-to-r from-sky-500 to-indigo-500 text-white flex justify-center items-center">
            <h2 class="text-3xl font-bold">
                News you can Trust.
            </h2>
        </div>

        <!-- Content -->
        <div class="text-center mt-8">

            <h3 class="text-4xl font-bold">
                Stay up to date with the Latest!
            </h3>

            <p class="mt-3 text-xl text-gray-700">
                Subscribe to our newsletter for the latest news straight into your inbox.
            </p>

            <!-- Form -->
            <form class="mt-8 flex flex-col items-center gap-5">

                <input
                    type="email"
                    placeholder="your@email.com"
                    class="w-[620px] h-12 rounded bg-gray-200 text-center outline-none placeholder:text-gray-500"
                >

                <button
                    class="w-[620px] h-12 rounded-full bg-blue-500 hover:bg-blue-600 text-white text-xl font-medium transition">
                    Subscribe Now
                </button>

            </form>

            <p class="mt-8 mb-8 text-gray-600">
                We value your privacy
            </p>

        </div>

    </div>

</body>
</html>
